dataset:
  primary_dataset: ESD English subset
  additional_dataset_for_neutral_adaptation: VCTK
  sampling_rate: 22050
  emotions_for_emotion_control:
    - Angry
    - Sad
    - Happy
    - Surprise

neutral_backbone_adaptation:
  base_model: Matcha-TTS pretrained on VCTK
  additional_speakers: 10 ESD speakers
  speaker_table_expansion: 109 VCTK speakers + 10 ESD speakers
  optimizer: AdamW
  learning_rate: 5.0e-5
  weight_decay: 0.01
  training_steps: 20000
  checkpoint_selection: lowest validation loss

emotion_control_training:
  backbone: Matcha-Base
  frozen_modules:
    - Text Encoder
    - Main CFM Decoder
    - Main U-Net
    - Speaker Embedding
  trainable_modules:
    - Emo-ControlNet
    - Emotional Duration Adapter
  trainable_parameters: approximately 27M
  trainable_ratio_full_model: 29.61%
  parameter_reduction_vs_full_update: 70.39%
  optimizer: Adam
  learning_rate: 5.0e-5
  weight_decay: 0.0
  batch_size: 32
  training_steps: 50000
  gpu: NVIDIA RTX 4090
  checkpoint_selection: lowest validation loss

features:
  mel_bins: 80
  fft_size: 1024
  window_size: 1024
  hop_size: 256
  sampling_rate: 22050

inference:
  ode_solver: Euler
  nfe: 50
  temperature: 0.667